<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Send Us a Message</title>

    <link rel="stylesheet" href="css/styles.css">

</head>

<body>

    <header>
        <nav class="navbar">
            <div class="nav-container">
                <a class="nav-logo" href="index.html">Eagle PRNDL</a>

                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="episodes.html">Episodes</a></li>
                    <li><a href="behind-the-scenes.html">About Us</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                </ul>
            </div>
        </nav>

        <header>
            <h1>Contact Eagle PRNDL</h1>
            <p>Get in touch with the podcast and our team.</p>
        </header>
    </header>

    <main>
        <article>
            <section>
                <h3>Send Us a Message</h3>

                <div class="content">
                    <form class="contact-form" action="#" method="post">

                        <div class="form-group">
                            <label for="name">Name *</label>
                            <input type="text" id="name" name="name" placeholder="Your full name" required>
                        </div>

                        <div class="form-group">
                            <label for="email">Email *</label>
                            <input type="email" id="email" name="email" placeholder="your@email.com" required>
                        </div>

                        <div class="form-group">
                            <label for="phone">Phone (Optional)</label>
                            <input type="tel" id="phone" name="phone" placeholder="(555) 123-4567">
                        </div>

                        <div class="form-group">
                            <label for="message">Message *</label>
                            <textarea id="message" name="message" rows="5" placeholder="Tell us what's on your mind..."
                                required></textarea>
                        </div>

                        <button type="submit">Send Message</button>

                    </form>
                </div>
            </section>
        </article>
    </main>

    <footer>
        <p>&copy; 2026 Eagle PRNDL</p>
    </footer>

</body>

</html>
